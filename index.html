  <!-- Video Modal -->
  <div class="modal" id="videoModal">
    <button class="modal-close" id="modalClose" aria-label="Schließen">&times;</button>
    <div class="modal-content">
      <video id="modalVideo" playsinline>
        <source src="" type="video/mp4">
      </video>
      <div class="custom-controls" id="customControls">
        <button class="ctrl-btn" id="ctrlPlayPause" aria-label="Play/Pause">
          <svg class="ctrl-icon icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <svg class="ctrl-icon icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="ctrl-progress" id="ctrlProgress">
          <div class="ctrl-progress-fill" id="ctrlProgressFill"></div>
        </div>
        <button class="ctrl-btn" id="ctrlMute" aria-label="Mute/Unmute">
          <svg class="ctrl-icon icon-sound" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <svg class="ctrl-icon icon-muted" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
    </div>
